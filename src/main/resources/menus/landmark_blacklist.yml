# 地标黑名单 - 管理禁止访问此地标的玩家
landmark_blacklist:
  title: "&a地标黑名单"
  shape:
    - "#########"
    - "#AAAAAAA#"
    - "N###T#S#P"
  items:
    A:
      type: PLAYER_HEAD
      name: "&c%blacklist_name%"
      lore:
        - "&fShift+左键 删除"
      action: ""
      shift_left_action: "remove_blacklist:%blacklist_uuid%"
    T:
      type: REDSTONE
      name: "&c添加黑名单"
      lore:
        - "&f点击添加新黑名单玩家"
      action: "add_blacklist"
    S:
      type: BARRIER
      name: "&c返回"
      lore:
        - "&f返回地标管理"
      action: "return_landmark_manage"
    N:
      type: ARROW
      name: "&a上一页 (%current_page%/%total_pages%)"
      action: "prev_page"
    P:
      type: ARROW
      name: "&a下一页 (%current_page%/%total_pages%)"
      action: "next_page"
    "#":
      type: BLACK_STAINED_GLASS_PANE
      name: " "
