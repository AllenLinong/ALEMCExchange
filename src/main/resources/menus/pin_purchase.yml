pin_purchase:
  title: "&a购买置顶位"
  shape:
    - "#########"
    - "####A####"
    - "##B###C##"
    - "#########"
  items:
    A:
      type: OAK_SIGN
      name: "&e%pin_selected_landmark%"
      lore:
        - "&f置顶位：&e#%pin_slot%"
        - "&f费用：&6%pin_cost% 金币"
        - "&f时长：&e%pin_days% 天"
        - ""
        - "&a点击选择自己的地标"
      action: "open_pin_landmark_select"
    B:
      type: LIME_WOOL
      name: "&a确认购买"
      lore:
        - "&f选择地标：&e%pin_selected_landmark%"
        - "&f费用：&6%pin_cost% 金币"
        - "&f时长：&e%pin_days% 天"
        - "&a点击确认后才会扣费"
      action: "confirm_pin_purchase"
    C:
      type: RED_WOOL
      name: "&c取消"
      lore:
        - "&7不扣费，不保存"
      action: "cancel_pin_purchase"
    "#":
      type: BLACK_STAINED_GLASS_PANE
      name: " "
