# 主菜单 — 浏览全部地标
#
# 菜单图标写法：
# 1. 原版物品：
#    type: BEACON
# 2. 资源包 CustomModelData：
#    type: PAPER
#    custom_model_data: 10001
# 3. CraftEngine 自定义物品（推荐）：
#    craftengine: "namespace:item_id"
# 4. ItemsAdder 自定义物品：
#    itemsadder: "namespace:item_id"
# 5. Oraxen 自定义物品：
#    oraxen: "item_id"
# 兼容旧写法：
#    plugin_item: "ce:namespace:item_id"
#    plugin_item: "ia:namespace:item_id"
#    plugin_item: "oraxen:item_id"
#    type: "ce:namespace:item_id"
# 注意：命名空间和物品ID之间必须使用英文半角冒号 ":"，不要使用中文全角冒号 "："。
main_menu:
  title: "&a玩家地标"
  shape:
    - "####W####"
    - "#1234567#"
    - "#AAAAAAA#"
    - "#AAAAAAA#"
    - "#########"
    - "N#Q#FSC#P"
  items:
    W:
      type: BEACON
      name: "&a我的地标"
      lore:
        - "&f点击查看并管理你的地标"
      action: "open_gui:my_landmarks"
    # 置顶位按钮配置：
    # - shape 里放多少个 pin_slot: true 的按钮，就有多少个置顶位。
    # - pin_slot_id 是置顶槽唯一编号；后续新增更多槽位时不要重复。
    # - 玩家点击空置顶位后进入购买界面；确认购买才会扣费并保存。
    # - cost 是购买这个置顶位的费用，duration_days 是从购买成功开始计算的置顶天数。
    # - 到期后会自动释放该位置，其他玩家可再次购买。
    # - 已有置顶地标时，左键传送，右键收藏/取消收藏，Shift+左键查看评论。
    1:
      type: OAK_SIGN
      name: "&6置顶位 #1"
      lore:
        - "&f状态：%pin_status%"
        - "&f费用：&6%pin_cost% 金币"
        - "&f时长：&e%pin_days% 天"
        - "&f到期：&e%pin_expires%"
        - "&a点击购买或使用此置顶位"
      # 标记这个按钮是置顶槽；自定义新增置顶槽时必须为 true。
      pin_slot: true
      # 置顶槽唯一编号；新增更多槽位时不要和其他槽重复。
      pin_slot_id: 1
      # 左键动作：空槽打开购买界面；已置顶时传送到该地标。
      action: "pin_slot:%pin_slot%"
      # 右键动作：已置顶时收藏/取消收藏该地标；空槽会打开购买界面。
      right_action: "pin_slot_favorite:%pin_slot%"
      # Shift+左键动作：已置顶时查看评论；空槽会打开购买界面。
      shift_left_action: "pin_slot_reviews:%pin_slot%"
      # 购买这个置顶位需要支付的金币，确认购买时才扣费。
      cost: 1000.0
      # 置顶持续天数，从确认购买成功那一刻开始计算。
      duration_days: 7
    2:
      type: OAK_SIGN
      name: "&6置顶位 #2"
      lore:
        - "&f状态：%pin_status%"
        - "&f费用：&6%pin_cost% 金币"
        - "&f时长：&e%pin_days% 天"
        - "&f到期：&e%pin_expires%"
        - "&a点击购买或使用此置顶位"
      pin_slot: true
      pin_slot_id: 2
      action: "pin_slot:%pin_slot%"
      right_action: "pin_slot_favorite:%pin_slot%"
      shift_left_action: "pin_slot_reviews:%pin_slot%"
      cost: 1000.0
      duration_days: 7
    3:
      type: OAK_SIGN
      name: "&6置顶位 #3"
      lore:
        - "&f状态：%pin_status%"
        - "&f费用：&6%pin_cost% 金币"
        - "&f时长：&e%pin_days% 天"
        - "&f到期：&e%pin_expires%"
        - "&a点击购买或使用此置顶位"
      pin_slot: true
      pin_slot_id: 3
      action: "pin_slot:%pin_slot%"
      right_action: "pin_slot_favorite:%pin_slot%"
      shift_left_action: "pin_slot_reviews:%pin_slot%"
      cost: 1000.0
      duration_days: 7
    4:
