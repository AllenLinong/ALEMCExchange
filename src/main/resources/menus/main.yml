      lore:
        - "&f状态：%pin_status%"
        - "&f费用：&6%pin_cost% 金币"
        - "&f时长：&e%pin_days% 天"
        - "&f到期：&e%pin_expires%"
        - "&a点击购买或使用此置顶位"
      pin_slot: true
