        - "&f费用：&6%pin_cost% 金币"
        - "&f时长：&e%pin_days% 天"
        - "&f到期：&e%pin_expires%"
        - "&a点击购买或使用此置顶位"
      pin_slot: true
      pin_slot_id: 4
      action: "pin_slot:%pin_slot%"
      right_action: "pin_slot_favorite:%pin_slot%"
      shift_left_action: "pin_slot_reviews:%pin_slot%"
      cost: 1000.0
      duration_days: 7
    5:
