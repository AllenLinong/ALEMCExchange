landmark_color_select:
  title: "&a颜色选择"
  shape:
    - "####C####"
    - "#AAAAAAA#"
    - "#AAAAAAA#"
    - "P###Q##NX"
  bold:
    permission: "alwarp.color.bold"
  items:
    A:
      type: PAPER
      name: "%color_sample%"
      lore:
        - "&f目标：%color_target%"
        - "&f预览：%color_sample%"
        - "&f权限：%color_permission%"
        - "%color_purchase_price%"
        - "%color_purchase_hint%"
        - "&a点击使用此颜色"
      action: "select_landmark_color:%color_id%"
      shift_right_action: "buy_landmark_color:%color_id%"
    C:
      type: ANVIL
      name: "&a切换加粗"
      lore:
        - "&f目标：%color_target%"
        - "&f当前字体：%color_bold_status%"
        - "&f权限：%color_bold_permission%"
        - "%color_bold_purchase_price%"
        - "%color_bold_purchase_hint%"
        - "&a点击切换"
      action: "toggle_landmark_text_bold"
      shift_right_action: "buy_landmark_bold"
    Q:
      type: WHITE_DYE
      name: "&f使用默认颜色"
      lore:
        - "&7清除自定义颜色和加粗"
        - "&a点击使用插件默认颜色"
      action: "clear_landmark_color"
    X:
      type: BARRIER
      name: "&c返回"
      lore:
        - "&f返回地标管理"
      action: "return_landmark_manage"
    P:
      type: ARROW
      name: "&e上一页"
      lore:
        - "&f当前：%current_page%/%total_pages%"
      action: "prev_page"
    N:
      type: ARROW
      name: "&e下一页"
      lore:
        - "&f当前：%current_page%/%total_pages%"
      action: "next_page"
    "#":
      type: BLACK_STAINED_GLASS_PANE
      name: " "
  colors:
    # 基础颜色默认读取 config.yml 的 landmark.color_system.unlock.color：点券 / 500
    # 内置渐变色在本菜单里使用 purchase 覆盖为：点券 / 1000
    # 每个颜色都可以可选覆盖全局购买配置：
    # purchase:
    #   enabled: true
    #   currency: "playerpoints" # vault 或 playerpoints
    #   price: 1000
    #   currency_name: "点券"    # 可改成 B币、宝石等
    black:
      type: BLACK_DYE
      name: "&0黑色"
      sample: "黑色预览"
      color: "&0"
      permission: "alwarp.color.black"
    dark_blue:
      type: BLUE_DYE
      name: "&1深蓝"
      sample: "深蓝预览"
      color: "&1"
      permission: "alwarp.color.dark_blue"
    dark_green:
      type: GREEN_DYE
      name: "&2深绿"
      sample: "深绿预览"
      color: "&2"
      permission: "alwarp.color.dark_green"
    dark_aqua:
      type: CYAN_DYE
      name: "&3深青"
      sample: "深青预览"
      color: "&3"
      permission: "alwarp.color.dark_aqua"
    dark_red:
