# 调试功能
debug:
  enabled: false  # 是否开启调试模式
  level: info  # 调试级别：info, debug, trace

# 数据库配置
database:
  type: sqlite  # 数据库类型：sqlite 或 mysql
  mysql:  # MySQL 数据库配置（当 type 为 mysql 时使用）
    host: localhost  # MySQL 主机地址
    port: 3306  # MySQL 端口
    database: minecraft  # MySQL 数据库名称
    user: root  # MySQL 用户名
    password: ''  # MySQL 密码
    connection-parameters: "?autoReconnect=true&useSSL=false&useUnicode=true&characterEncoding=UTF-8"  # 连接参数
    pool-settings:  # 连接池设置
      max-pool-size: 10  # 最大连接数
      min-idle: 5  # 最小空闲连接数
      max-lifetime: 1800000  # 连接最大生命周期（毫秒）
      keep-alive-time: 60000  # 连接保持时间（毫秒）
      time-out: 30000  # 连接超时时间（毫秒）
  table_prefix: 'alembc_'  # 表名前缀，用于避免表名冲突
  sqlite:  # SQLite 数据库配置（当 type 为 sqlite 时使用）
    file: 'alembc.db'  # SQLite 数据库文件名称

# 默认税率配置
sell_tax: 0.05  # 默认税率 5%

# 不同权限的税率配置
tax_rates:
  alemcexchange.vip: 0.03  # VIP 3% 税率
  alemcexchange.premium: 0.01  # 高级用户 1% 税率
  alemcexchange.notax: 0.0  # 无税率

# 功能开关
features:
  auto_sell: true  # 是否开启自动出售功能

# 自动出售相关设置
autosell:
  send_message: true  # 自动出售时是否发送提示消息
  batch_threshold: 64  # 批量出售阈值，达到此数量才自动出售

# 权限说明
# alemcexchange.use - 基础使用权限（默认所有玩家拥有）
# alemcexchange.admin - 管理员权限，用于执行reload、give命令和解锁其他玩家的所有物品
# alemcexchange.autosell - 允许使用自动出售功能
# alemcexchange.notax - 无税率权限
# alemcexchange.vip - VIP权限，3%税率
# alemcexchange.premium - 高级用户权限，1%税率
# alemcexchange.unlockall.auto - 自动解锁所有物品（无需执行命令）
