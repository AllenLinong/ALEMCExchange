# 语言文件

prefix: "&6[EMC系统] &r"

# 命令消息
command:
  player-only: "&c只有玩家可以执行此命令！"
  no-permission: "&c你没有权限执行此命令！"
  unknown: "&c未知命令，请使用 /alex 查看帮助！"
  invalid-amount: "&c无效的金额！"
  player-not-found: "&c玩家未找到！"
  insufficient-funds: "&c余额不足！"
  balance: "&a你的 EMC 余额: &6{balance}&a!"
  balance-failed: "&c获取余额失败！"
  autosell: "&a自动出售已{status}！"
  reload: "&a配置已重载！"
  operation-failed: "&c操作失败！"
  give:
    usage: "&c用法: /alex give <玩家> <金额>"
    success: "&a已给予 &6{player} &a{amount} EMC！"
  transfer:
    usage: "&c用法: /alex transfer <玩家> <金额>"
    success: "&a已转账 &6{amount} EMC &a给 &6{player} &a(税后: &6{netAmount} &a，税费: &6{tax}&a)"
    received: "&a你收到了来自 &6{player} &a的 &6{amount} EMC！"
