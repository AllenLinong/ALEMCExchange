  unlockall:
    usage: "&c用法: /alex unlockall <玩家>"
    success: "&a已解锁 &6{player} &a的所有物品！"
  unlock:
    usage: "&c用法: /alex unlock <玩家> <物品ID>"
    success: "&a已为 &6{player} &a解锁物品: &6{item} &a！"
    invalid-item: "&c无效的物品ID！"
  set:
    usage: "&c用法: /alex set <玩家> <金额>"
    success: "&a已将 &6{player} &a的EMC设置为: &6{amount}"

# 帮助消息
help:
  title: "&6=== ALEMCExchange 帮助 ===="
  main: "&a/alex &7- 打开主菜单"
  help: "&a/alex help &7- 显示此帮助信息"
  sell: "&a/alex sell &7- 打开出售菜单"
  exchange: "&a/alex exchange &7- 打开兑换菜单"
  browse: "&a/alex browse &7- 打开浏览菜单"
  balance: "&a/alex balance &7- 查看EMC余额"
  autosell: "&a/alex autosell &7- 切换自动出售功能"
  pay: "&a/alex pay <玩家> <金额> &7- 转账给其他玩家"
  reload: "&a/alex reload &7- 重载配置文件"
  give: "&a/alex give <玩家> <金额> &7- 给玩家增加EMC"
  set: "&a/alex set <玩家> <金额> &7- 设置玩家的EMC值"
  unlockall: "&a/alex unlockall <玩家> &7- 解锁玩家的所有物品"
  unlock: "&a/alex unlock <玩家> <物品ID> &7- 解锁玩家的单个物品"
  footer: "&6===================="

# 菜单消息
menu:
  sell:
    success: "&a出售成功！获得 &6{amount} EMC"
    failed: "&c出售失败！"
  exchange:
    inventory-full: "&c背包已满，无法兑换！"
    purchase-success: "&a购买成功！消耗 &6{amount} EMC"
    error: "&c兑换过程中发生错误！"

# 自动出售消息
autosell:
  enabled: "&a自动出售已开启！"
  disabled: "&c自动出售已关闭！"
  sold: "&a自动出售: &6{amount} EMC"

# 挖掘消息
mine:
  progress: "&e挖掘进度: &6{current}/{required} &e({percent}%)"
  unlocked: "&a恭喜解锁 &6{item} &a！"

# 出售消息
sell:
  progress: "&e出售进度: &6{current}/{required} &e({percent}%)"
  unlocked: "&a恭喜解锁 &6{item} &a！"
