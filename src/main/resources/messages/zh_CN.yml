# ── 指令帮助 ──
help:
  user:
    - "&8&m━━━━━━━━━━━━&r &a&lALwarp 帮助 &8&m━━━━━━━━━━━━"
    - "&a/alwarp &8- &f打开地标菜单"
    - "&a/alwarp create &8- &f创建一个新地标"
    - "&7提示：传送只能在菜单中点击地标完成。"
  admin:
    - "&8&m━━━━━━━━━━━━&r &a&l管理员命令 &8&m━━━━━━━━━━━━"
    - "&a/alwarp admin &8- &f打开管理员地标菜单"
    - "&a/alwarp reload &8- &f重载配置和菜单"
    - "&a/alwarp export [文件名] &8- &f导出地标数据"
    - "&a/alwarp import [文件名] &8- &f导入地标数据"
    - "&a/alwarp purge landmarks <玩家名> &8- &f删除该玩家名下所有地标"
    - "&a/alwarp purge records <玩家名> &8- &f删除该玩家收藏和评分评论"
    - "&8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

