# ============================================================
# ALwarp English Messages (messages/en_US.yml)
# ============================================================
# Set language via config.yml → language: "en_US"
# Available placeholders: %prefix% %id% %player% %cost% %count% %file% %d %.2f %server%
# ============================================================

