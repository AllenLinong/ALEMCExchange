# ── Command Help ──
help:
  user:
    - "&8&m━━━━━━━━━━━━&r &a&lALwarp Help &8&m━━━━━━━━━━━━"
    - "&a/alwarp &8- &fOpen the landmark menu"
    - "&a/alwarp create &8- &fCreate a new landmark"
    - "&7Tip: teleporting is only available by clicking landmarks in the menu."
  admin:
    - "&8&m━━━━━━━━━━━━&r &a&lAdmin Commands &8&m━━━━━━━━━━━━"
    - "&a/alwarp admin &8- &fOpen the admin landmark menu"
    - "&a/alwarp reload &8- &fReload config and menus"
    - "&a/alwarp export [file] &8- &fExport landmark data"
    - "&a/alwarp import [file] &8- &fImport landmark data"
    - "&a/alwarp purge landmarks <player> &8- &fDelete all landmarks owned by player"
    - "&a/alwarp purge records <player> &8- &fDelete player's favorites and rating comments"
    - "&8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

