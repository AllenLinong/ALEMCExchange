pin_landmark_select:
  title: "&aSelect Landmark to Pin"
  shape:
    - "#########"
    - "#AAAAAAA#"
    - "#AAAAAAA#"
    - "#AAAAAAA#"
    - "#########"
    - "N#######P"
  items:
    A:
      type: COMPASS
      name: "&e%landmark_name%"
      lore:
        - "&fDescription"
        - "&a%landmark_description%"
        - ""
        - "&fCategory: %landmark_category%"
        - "&fServer: %landmark_server%"
        - "&aClick to select this landmark"
      action: "select_pin_landmark:%landmark_id%"
    N:
      type: ARROW
      name: "&aPrevious (%current_page%/%total_pages%)"
      action: "prev_page"
    P:
      type: ARROW
      name: "&aNext (%current_page%/%total_pages%)"
      action: "next_page"
    "#":
      type: BLACK_STAINED_GLASS_PANE
      name: " "
