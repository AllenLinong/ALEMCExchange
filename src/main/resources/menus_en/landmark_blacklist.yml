# Landmark Blacklist - manage players blocked from this landmark
landmark_blacklist:
  title: "&aLandmark Blacklist"
  shape:
    - "#########"
    - "#AAAAAAA#"
    - "N###T#S#P"
  items:
    A:
      type: PLAYER_HEAD
      name: "&c%blacklist_name%"
      lore:
        - "&fShift+LClick to remove"
      action: ""
      shift_left_action: "remove_blacklist:%blacklist_uuid%"
    T:
      type: REDSTONE
      name: "&cAdd Blacklist"
      lore:
        - "&fClick to add a player"
      action: "add_blacklist"
    S:
      type: BARRIER
      name: "&cBack"
      lore:
        - "&fReturn to landmark management"
      action: "return_landmark_manage"
    N:
      type: ARROW
      name: "&aPrevious (%current_page%/%total_pages%)"
      action: "prev_page"
    P:
      type: ARROW
      name: "&aNext (%current_page%/%total_pages%)"
      action: "next_page"
    "#":
      type: BLACK_STAINED_GLASS_PANE
      name: " "
