# Managed Landmarks - landmarks where you have manager access
managed_landmarks:
  title: "&aManaged Landmarks"
  shape:
    - "#########"
    - "#AAAAAAA#"
    - "#AAAAAAA#"
    - "#AAAAAAA#"
    - "#########"
    - "N###F###P"
  items:
    A:
      type: COMPASS
      name: "&e%landmark_name%"
      lore:
        - "&fDescription"
        - "&a%landmark_description%"
        - ""
        - "&fOwner: %landmark_owner%"
        - "&fCategory: %landmark_category%"
        - "&fVisits: %landmark_visits%"
        - "&fPrice: %landmark_price%"
        - "&fVisibility: %landmark_private%"
        - ""
        - "&aLeft: Teleport"
        - "&eRight: Manage"
      action: "teleport:%landmark_id%"
      right_action: "open_gui:landmark_manage:%landmark_id%"
    F:
      type: BOOK
      name: "&aBack to My Landmarks"
      action: "open_gui:my_landmarks"
    N:
      type: ARROW
      name: "&aPrevious (%current_page%/%total_pages%)"
      action: "prev_page"
    P:
      type: ARROW
      name: "&aNext (%current_page%/%total_pages%)"
      action: "next_page"
    "#":
      type: BLACK_STAINED_GLASS_PANE
      name: " "
