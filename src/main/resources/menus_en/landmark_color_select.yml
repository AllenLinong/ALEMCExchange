landmark_color_select:
  title: "&aColor Select"
  shape:
    - "####C####"
    - "#AAAAAAA#"
    - "#AAAAAAA#"
    - "P###Q##NX"
  bold:
    permission: "alwarp.color.bold"
  items:
    A:
      type: PAPER
      name: "%color_sample%"
      lore:
        - "&fTarget: %color_target%"
        - "&fPreview: %color_sample%"
        - "&fPermission: %color_permission%"
        - "%color_purchase_price%"
        - "%color_purchase_hint%"
        - "&aClick to use this color"
      action: "select_landmark_color:%color_id%"
      shift_right_action: "buy_landmark_color:%color_id%"
    C:
      type: ANVIL
      name: "&aToggle Bold"
      lore:
        - "&fTarget: %color_target%"
        - "&fCurrent font: %color_bold_status%"
        - "&fPermission: %color_bold_permission%"
        - "%color_bold_purchase_price%"
        - "%color_bold_purchase_hint%"
        - "&aClick to toggle"
      action: "toggle_landmark_text_bold"
      shift_right_action: "buy_landmark_bold"
    Q:
      type: WHITE_DYE
      name: "&fUse Default Color"
      lore:
        - "&7Clears custom color and bold"
        - "&aClick to use plugin default color"
      action: "clear_landmark_color"
    X:
      type: BARRIER
      name: "&cBack"
      lore:
        - "&fReturn to landmark management"
      action: "return_landmark_manage"
    P:
      type: ARROW
      name: "&ePrevious Page"
      lore:
        - "&fCurrent: %current_page%/%total_pages%"
      action: "prev_page"
    N:
      type: ARROW
      name: "&eNext Page"
      lore:
        - "&fCurrent: %current_page%/%total_pages%"
      action: "next_page"
    "#":
      type: BLACK_STAINED_GLASS_PANE
      name: " "
  colors:
    # Solid colors read config.yml landmark.color_system.unlock.color by default: points / 500
    # Built-in gradients override purchase here: points / 1000
    # Each color may optionally override the global purchase config:
    # purchase:
    #   enabled: true
    #   currency: "playerpoints" # vault or playerpoints
    #   price: 1000
    #   currency_name: "points"
    black:
      type: BLACK_DYE
      name: "&0Black"
      sample: "Black Preview"
      color: "&0"
      permission: "alwarp.color.black"
    dark_blue:
      type: BLUE_DYE
      name: "&1Dark Blue"
      sample: "Dark Blue Preview"
      color: "&1"
      permission: "alwarp.color.dark_blue"
    dark_green:
      type: GREEN_DYE
      name: "&2Dark Green"
      sample: "Dark Green Preview"
      color: "&2"
      permission: "alwarp.color.dark_green"
    dark_aqua:
      type: CYAN_DYE
      name: "&3Dark Aqua"
      sample: "Dark Aqua Preview"
      color: "&3"
      permission: "alwarp.color.dark_aqua"
    dark_red:
      type: RED_DYE
      name: "&4Dark Red"
      sample: "Dark Red Preview"
      color: "&4"
      permission: "alwarp.color.dark_red"
    dark_purple:
