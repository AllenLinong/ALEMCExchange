# My Favorites 鈥?bookmarked landmarks
my_favorites:
  title: "&aMy Favorites"
  shape:
    - "#########"
    - "#AAAAAAA#"
    - "#AAAAAAA#"
    - "#AAAAAAA#"
    - "#########"
    - "N#Q#F#S#P"
  items:
    A:
      type: COMPASS
      name: "&e%landmark_name%"
      lore:
        - "&fDescription"
        - "&a%landmark_description%"
        - ""
        - "&fCategory: %landmark_category%"
        - "&fVisits: %landmark_visits%"
        - "&fOwner: %landmark_owner%"
        - "&fCreated: %landmark_date%"
        - "&fRating: %landmark_rating%"
        - "&fFavorite heat: %landmark_weekly%"
        - "&fPrice: %landmark_price%"
        - "&fServer: %landmark_server%"
        - ""
        - "&aLeft: Teleport"
        - "&eRight: Unfavorite"
        - "&bShift+Left: Reviews"
      action: "teleport:%landmark_id%"
      right_action: "toggle_favorite:%landmark_id%"
      shift_left_action: "view_reviews:%landmark_id%"
    N:
      type: ARROW
      name: "&aPrevious (%current_page%/%total_pages%)"
      action: "prev_page"
    P:
      type: ARROW
      name: "&aNext (%current_page%/%total_pages%)"
      action: "next_page"
    Q:
      type: COMPASS
      name: "&aSearch"
      lore:
        - "&fSearching: %current_search%"
        - "&aLeft: Search"
        - "&eRight: Clear"
      action: "search"
      right_action: "clear_search"
    F:
      type: BOOK
      name: "&aFilter"
      lore:
        - "&fCurrent: %current_filter%"
        - "&aClick to switch"
      action: "filter_toggle"
    S:
      type: NETHER_STAR
      name: "&aMain Menu"
      action: "open_gui:main_menu"
    "#":
      type: BLACK_STAINED_GLASS_PANE
      name: " "

