# Landmark Reviews — view & delete reviews (Shift+LClick A = admin delete, Shift+LClick S = delete own review)
landmark_reviews:
  title: "&aReviews"
  shape:
    - "####W####"
    - "#AAAAAAA#"
    - "#AAAAAAA#"
    - "#AAAAAAA#"
    - "#########"
    - "N#B#F#S#P"
  items:
    W:
      type: BOOK
      name: "&e%landmark_name%"
      lore:
        - "&fOwner: &e%landmark_owner%"
        - "&fCategory: &e%landmark_category%"
        - "&fDescription"
        - "&a%landmark_description%"
        - "&fRating: &e%landmark_rating%"
        - "&fReviews: &e%rating_count%"
    A:
      type: PLAYER_HEAD
      name: "&e%review_player%"
      lore:
        - "&fScore: %review_score%"
        - "&fComment:"
        - "%review_comment%"
        - ""
        - "&fDate: %review_date%"
        - "&fTime: %review_time%"
        - "%review_report_hint%"
    F:
      type: BOOK
      name: "&aMain Menu"
      action: "open_gui:main_menu"
    B:
      type: BOOK
      name: "&aRate & Review"
      lore:
        - "&aClick to rate and review this landmark"
      action: "rate_current_landmark"
    S:
      type: WRITABLE_BOOK
      name: "&eMy Review"
      lore:
        - "&fScore: %own_review_score%"
        - "&fComment:"
        - "%own_review_comment%"
        - "&fDate: %own_review_date%"
        - "&fTime: %own_review_time%"
        - ""
        - "%own_review_delete_hint%"
        - "%own_review_delete_note%"
      shift_left_action: "delete_own_review"
    N:
      type: ARROW
      name: "&aPrevious (%current_page%/%total_pages%)"
      action: "prev_page"
    P:
      type: ARROW
      name: "&aNext (%current_page%/%total_pages%)"
      action: "next_page"
    "#":
      type: BLACK_STAINED_GLASS_PANE
      name: " "
