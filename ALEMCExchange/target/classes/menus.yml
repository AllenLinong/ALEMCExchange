# 菜单配置文件 - 用于定义插件的所有菜单
# 说明：
# - 所有颜色代码使用 & 前缀，例如 &a 表示绿色，&c 表示红色
# - slot 位置从 0 开始，第一行 0-8，第二行 9-17，以此类推
# - material 使用 Bukkit 材质名称，可参考 Bukkit 材质列表
#   - 支持自定义材质：格式为 "plugin:material"，例如 "ce:custom_item" 或 "ia:item_name"
# - display_name 为按钮显示名称，支持颜色代码
# - lore 为按钮悬停时显示的描述文本，支持多行

menus:
  # 主菜单配置
  main:
    title: "&6ALEMCExchange 主菜单"  # 菜单标题
    rows: 3  # 菜单行数（3行 = 27格）
    buttons:  # 按钮配置
      sell:  # 出售物品按钮
        slot: 10  # 按钮位置（第二行第二格）
        material: GREEN_TERRACOTTA  # 按钮材质
        display_name: "&a出售物品"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7点击打开出售菜单"
          - "&7将物品放入并出售获得EMC"
          - "&7当前EMC: &6%balance%" 
      exchange:  # 兑换物品按钮
        slot: 13  # 按钮位置（第二行第五格）
        material: DIAMOND  # 按钮材质
        display_name: "&a兑换物品"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7点击打开兑换菜单"
          - "&7消耗EMC兑换已解锁的物品"
          - "&7当前EMC: &6%balance%" 
      browse:  # 浏览物品按钮
        slot: 16  # 按钮位置（第二行第八格）
        material: BOOK  # 按钮材质
        display_name: "&a浏览物品"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7点击打开浏览菜单"
          - "&7查看所有可兑换物品及解锁进度"
          - "&7当前EMC: &6%balance%" 
      close:  # 关闭按钮
        slot: 26  # 按钮位置（第三行第九格）
        material: BARRIER  # 按钮材质
        display_name: "&c关闭"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7点击关闭菜单"

  # 出售菜单配置（54格大箱子）
  sell:
    title: "&6出售物品"  # 菜单标题
    rows: 6  # 菜单行数（6行 = 54格，插件会自动处理）
    buttons:
      info:  # 说明按钮
        slot: 4  # 按钮位置（第一行第五格，索引4，对应第5格）
        material: PAPER  # 按钮材质
        display_name: "&e出售说明"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7将物品放入上方格子"
          - "&7点击下方绿宝石块出售"
          - "&7不可出售的物品将返还"
      sell:  # 出售按钮
        slot: 49  # 按钮位置（第六行第五格，索引49，对应第50格）
        material: EMERALD_BLOCK  # 按钮材质
        display_name: "&a出售"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7点击出售所有物品"
          - "&7当前税率: &6%tax%%"  # %tax% 会被替换为实际税率
      back:  # 返回按钮
        slot: 53  # 按钮位置（第六行第九格，索引53，对应第54格）
        material: ARROW  # 按钮材质
        display_name: "&c返回"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7点击返回主菜单"
    # 玻璃板配置
    glass:
      slots: [0, 1, 2, 3, 5, 6, 7, 8,  # 第一行（除了说明按钮）
              45, 46, 47, 48, 50, 51, 52]  # 第六行（除了出售按钮和返回按钮）
      # 说明：玻璃板用于填充菜单空白位置，使菜单看起来更美观
      material: GRAY_STAINED_GLASS_PANE  # 玻璃板材质
      display_name: " "  # 玻璃板显示名称（空格表示不显示名称）

  # 兑换菜单配置
  exchange:
    title: "&6兑换物品"  # 菜单标题
    rows: 6  # 菜单行数（6行 = 54格）
    # 物品显示区域配置
    display:
      slots: [9, 10, 11, 12, 13, 14, 15, 16, 17,  # 第二行（索引9-17，对应第10-18格）
              18, 19, 20, 21, 22, 23, 24, 25, 26,  # 第三行（索引18-26，对应第19-27格）
              27, 28, 29, 30, 31, 32, 33, 34, 35,  # 第四行（索引27-35，对应第28-36格）
              36, 37, 38, 39, 40, 41, 42, 43, 44]  # 第五行（索引36-44，对应第37-45格）
      # 说明：物品会按照列表中的顺序依次显示在指定位置
      # 注意：索引从0开始，第一行索引0-8，第二行索引9-17，以此类推
      # 例如：[9, 10, 11] 表示物品会在索引9、10、11的位置显示（即第10、11、12格）
    # 按钮配置
    buttons:
      info:  # 说明按钮
        slot: 4  # 按钮位置（第一行第五格，索引4，对应第5格）
        material: PAPER  # 按钮材质
        display_name: "&e兑换说明"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7左键点击: 购买1个"
          - "&7右键点击: 购买一组(64个)"
          - "&7当前EMC: &6%balance%"  # %balance% 会被替换为玩家当前EMC
      back:  # 返回按钮
        slot: 8  # 按钮位置（第一行最后一格，索引8，对应第9格）
        material: ARROW  # 按钮材质
        display_name: "&c返回"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7点击返回主菜单"
      prev_page:  # 上一页按钮
        slot: 45  # 按钮位置（第六行第一格，索引45，对应第46格）
        material: ARROW  # 按钮材质
        display_name: "&a上一页"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7点击查看上一页"
          - "&7第 %prev_page% 页"  # %prev_page% 会被替换为上一页页码
      next_page:  # 下一页按钮
        slot: 53  # 按钮位置（第六行第九格，索引53，对应第54格）
        material: ARROW  # 按钮材质
        display_name: "&a下一页"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7点击查看下一页"
          - "&7第 %next_page% 页"  # %next_page% 会被替换为下一页页码
      page_info:  # 页码信息按钮
        slot: 49  # 按钮位置（第六行第五格，索引49，对应第50格）
        material: PAPER  # 按钮材质
        display_name: "&6页码: %page%/%total_pages%"  # %page% 当前页码, %total_pages% 总页数
        lore:  # 按钮悬停描述
          - "&7共有 %total_items% 个可兑换物品"  # %total_items% 总物品数
          - "&7每页显示 %items_per_page% 个物品"  # %items_per_page% 每页物品数
    # 玻璃板配置
    glass:
      slots: [0, 1, 2, 3, 5, 6, 7,  # 第一行（除了说明按钮和返回按钮）
              46, 47, 48, 50, 51, 52]  # 第六行（除了上一页、下一页、页码信息按钮）
      # 说明：玻璃板用于填充菜单空白位置，使菜单看起来更美观
      material: GRAY_STAINED_GLASS_PANE  # 玻璃板材质
      display_name: " "  # 玻璃板显示名称（空格表示不显示名称）

  # 浏览菜单配置
  browse:
    title: "&6浏览物品"  # 菜单标题
    rows: 6  # 菜单行数（6行 = 54格）
    # 物品显示区域配置
    display:
      slots: [9, 10, 11, 12, 13, 14, 15, 16, 17,  # 第二行（索引9-17，对应第10-18格）
              18, 19, 20, 21, 22, 23, 24, 25, 26,  # 第三行（索引18-26，对应第19-27格）
              27, 28, 29, 30, 31, 32, 33, 34, 35,  # 第四行（索引27-35，对应第28-36格）
              36, 37, 38, 39, 40, 41, 42, 43, 44]  # 第五行（索引36-44，对应第37-45格）
      # 说明：物品会按照列表中的顺序依次显示在指定位置
      # 注意：索引从0开始，第一行索引0-8，第二行索引9-17，以此类推
      # 例如：[9, 10, 11] 表示物品会在索引9、10、11的位置显示（即第10、11、12格）
    # 按钮配置
    buttons:
      info:  # 说明按钮
        slot: 4  # 按钮位置（第一行第五格，索引4，对应第5格）
        material: PAPER  # 按钮材质
        display_name: "&e浏览说明"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7查看所有可兑换物品"
          - "&7悬停查看解锁进度"
          - "&7绿色: 已解锁"
          - "&7红色: 未解锁"
      back:  # 返回按钮
        slot: 8  # 按钮位置（第一行最后一格，索引8，对应第9格）
        material: ARROW  # 按钮材质
        display_name: "&c返回"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7点击返回主菜单"
      prev_page:  # 上一页按钮
        slot: 45  # 按钮位置（第六行第一格，索引45，对应第46格）
        material: ARROW  # 按钮材质
        display_name: "&a上一页"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7点击查看上一页"
          - "&7第 %prev_page% 页"  # %prev_page% 会被替换为上一页页码
      next_page:  # 下一页按钮
        slot: 53  # 按钮位置（第六行第九格，索引53，对应第54格）
        material: ARROW  # 按钮材质
        display_name: "&a下一页"  # 按钮显示名称
        lore:  # 按钮悬停描述
          - "&7点击查看下一页"
          - "&7第 %next_page% 页"  # %next_page% 会被替换为下一页页码
      page_info:  # 页码信息按钮
        slot: 49  # 按钮位置（第六行第五格，索引49，对应第50格）
        material: PAPER  # 按钮材质
        display_name: "&6页码: %page%/%total_pages%"  # %page% 当前页码, %total_pages% 总页数
        lore:  # 按钮悬停描述
          - "&7共有 %total_items% 个物品"  # %total_items% 总物品数
          - "&7每页显示 %items_per_page% 个物品"  # %items_per_page% 每页物品数
    # 玻璃板配置
    glass:
      slots: [0, 1, 2, 3, 5, 6, 7,  # 第一行（除了说明按钮和返回按钮）
              46, 47, 48, 50, 51, 52]  # 第六行（除了上一页、下一页、页码信息按钮）
      # 说明：玻璃板用于填充菜单空白位置，使菜单看起来更美观
      material: GRAY_STAINED_GLASS_PANE  # 玻璃板材质
      display_name: " "  # 玻璃板显示名称（空格表示不显示名称）

# 配置修改提示：
# 1. 物品显示区域配置说明：
#    - slots: 物品显示位置的列表，物品会按照列表顺序依次显示
#    - 注意：列表中的数字是物品栏的索引（从0开始）
#    - 索引对照表：
#      第一行：索引 0-8（对应第1-9格）
#      第二行：索引 9-17（对应第10-18格）
#      第三行：索引 18-26（对应第19-27格）
#      第四行：索引 27-35（对应第28-36格）
#      第五行：索引 36-44（对应第37-45格）
#      第六行：索引 45-53（对应第46-54格）
#    - 例如：[9, 10, 11] 表示物品会在索引9、10、11的位置显示（即第10、11、12格）
# 2. 按钮配置说明：
#    - slot: 按钮位置（索引从0开始）
#    - material: 按钮材质（Minecraft物品ID）
#    - display_name: 按钮显示名称（支持颜色代码）
#    - lore: 按钮悬停描述（支持颜色代码和变量替换）
# 3. 特殊按钮变量说明：
#    - %balance%: 玩家当前EMC余额（仅兑换菜单）
#    - %prev_page%: 上一页页码
#    - %next_page%: 下一页页码
#    - %page%: 当前页码
#    - %total_pages%: 总页数
#    - %total_items%: 总物品数
#    - %items_per_page%: 每页物品数
# 4. 颜色代码可参考 Minecraft 颜色代码表
# 5. 出售菜单已固定为54格，第一行和最后一行会自动填充玻璃板
